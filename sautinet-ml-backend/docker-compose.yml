version: "3.9"

services:
  # ── SentiKenya API (Nairobi Node) ──
  sentikenya-nbo:
    build: .
    container_name: sentikenya-nbo
    ports:
      - "8000:8000"
    environment:
      - NODE_ID=NBO-01
      - NODE_REGION=nairobi
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@timescaledb:5432/sentikenya
      - REDIS_URL=redis://redis:6379/0
      - IPFS_API_URL=http://ipfs:5001
      - ENABLE_IPFS=true
      - USE_GPU=false
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_cache:/app/model_cache
    networks:
      - sentikenya-net
    restart: unless-stopped

  # ── SentiKenya API (Mombasa Node) ──
  sentikenya-msa:
    build: .
    container_name: sentikenya-msa
    ports:
      - "8001:8000"
    environment:
      - NODE_ID=MSA-01
      - NODE_REGION=mombasa
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@timescaledb:5432/sentikenya
      - REDIS_URL=redis://redis:6379/1
      - IPFS_API_URL=http://ipfs:5001
      - ENABLE_IPFS=true
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - model_cache:/app/model_cache
    networks:
      - sentikenya-net
    restart: unless-stopped

  # ── SentiKenya API (Kisumu Node) ──
  sentikenya-ksm:
    build: .
    container_name: sentikenya-ksm
    ports:
      - "8002:8000"
    environment:
      - NODE_ID=KSM-01
      - NODE_REGION=kisumu
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@timescaledb:5432/sentikenya
      - REDIS_URL=redis://redis:6379/2
      - IPFS_API_URL=http://ipfs:5001
      - ENABLE_IPFS=true
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - model_cache:/app/model_cache
    networks:
      - sentikenya-net
    restart: unless-stopped

  # ── Apache Kafka ──
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sentikenya-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - sentikenya-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sentikenya-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentikenya-net

  # ── TimescaleDB (PostgreSQL + Time-series) ──
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: sentikenya-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentikenya
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentikenya-net

  # ── Redis (Cache + Pub/Sub) ──
  redis:
    image: redis:7-alpine
    container_name: sentikenya-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentikenya-net

  # ── IPFS Node ──
  ipfs:
    image: ipfs/kubo:latest
    container_name: sentikenya-ipfs
    ports:
      - "4001:4001"   # Swarm
      - "5001:5001"   # API
      - "8080:8080"   # Gateway
    volumes:
      - ipfs_data:/data/ipfs
    networks:
      - sentikenya-net

  # ── Kafka UI (Development) ──
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: sentikenya-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: sentikenya
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - sentikenya-net

volumes:
  timescaledb_data:
  ipfs_data:
  model_cache:

networks:
  sentikenya-net:
    driver: bridge
